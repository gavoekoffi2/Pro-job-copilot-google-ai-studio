name: Deploy to Netlify

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Netlify secrets
        run: |
          if [ -z "$NETLIFY_AUTH_TOKEN" ]; then
            echo "::error::NETLIFY_AUTH_TOKEN is missing. Add it in GitHub repo secrets."
            exit 1
          fi
          if [ -z "$NETLIFY_SITE_ID" ]; then
            echo "::error::NETLIFY_SITE_ID is missing. Add it in GitHub repo secrets."
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit high/critical vulnerabilities
        run: npm audit --audit-level=high

      - name: Build
        run: npm run build

      - name: Deploy production
        run: npx netlify deploy --prod --dir=dist --site "$NETLIFY_SITE_ID" --auth "$NETLIFY_AUTH_TOKEN"
