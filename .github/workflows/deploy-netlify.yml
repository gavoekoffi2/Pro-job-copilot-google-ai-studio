name: Deploy to Netlify

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL || 'google/gemini-2.5-flash' }}
      AI_PROVIDER: ${{ vars.AI_PROVIDER || 'nvidia' }}
      NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
      NVIDIA_MODEL: ${{ vars.NVIDIA_MODEL || 'google/diffusiongemma-26b-a4b-it' }}
      GENIUSPAY_API_KEY: ${{ secrets.GENIUSPAY_API_KEY }}
      GENIUSPAY_API_SECRET: ${{ secrets.GENIUSPAY_API_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify deployment secrets
        run: |
          if [ -z "$NETLIFY_AUTH_TOKEN" ]; then
            echo "::error::NETLIFY_AUTH_TOKEN is missing. Add it in GitHub repo secrets."
            exit 1
          fi
          if [ -z "$NETLIFY_SITE_ID" ]; then
            echo "::error::NETLIFY_SITE_ID is missing. Add it in GitHub repo secrets."
            exit 1
          fi
          if [ -z "$OPENROUTER_API_KEY" ]; then
            echo "::notice::OPENROUTER_API_KEY is missing. Deployment can still use NVIDIA if NVIDIA_API_KEY is configured."
          fi
          if [ "$AI_PROVIDER" = "nvidia" ] && [ -z "$NVIDIA_API_KEY" ]; then
            echo "::warning::AI_PROVIDER=nvidia but NVIDIA_API_KEY is missing. AI features will return a clear configuration error until the secret is added."
          fi
          if [ -z "$GENIUSPAY_API_KEY" ] || [ -z "$GENIUSPAY_API_SECRET" ]; then
            echo "::warning::GeniusPay credentials are incomplete. Deployment will continue, but checkout will return a clear configuration error until GENIUSPAY_API_KEY and GENIUSPAY_API_SECRET are added."
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit high/critical vulnerabilities
        run: npm audit --audit-level=high

      - name: Build
        run: npm run build

      - name: Sync runtime env to Netlify
        run: |
          if [ -n "$OPENROUTER_API_KEY" ]; then
            npx netlify env:set OPENROUTER_API_KEY "$OPENROUTER_API_KEY" --context production --site "$NETLIFY_SITE_ID" --auth "$NETLIFY_AUTH_TOKEN"
            npx netlify env:set OPENROUTER_MODEL "$OPENROUTER_MODEL" --context production --site "$NETLIFY_SITE_ID" --auth "$NETLIFY_AUTH_TOKEN"
          else
            echo "OPENROUTER_API_KEY not provided in GitHub secrets; keeping existing Netlify production env unchanged."
          fi
          npx netlify env:set AI_PROVIDER "$AI_PROVIDER" --context production --site "$NETLIFY_SITE_ID" --auth "$NETLIFY_AUTH_TOKEN"
          npx netlify env:set NVIDIA_MODEL "$NVIDIA_MODEL" --context production --site "$NETLIFY_SITE_ID" --auth "$NETLIFY_AUTH_TOKEN"
          if [ -n "$NVIDIA_API_KEY" ]; then
            npx netlify env:set NVIDIA_API_KEY "$NVIDIA_API_KEY" --context production --site "$NETLIFY_SITE_ID" --auth "$NETLIFY_AUTH_TOKEN"
          else
            echo "NVIDIA_API_KEY not provided in GitHub secrets; keeping existing Netlify production env unchanged."
          fi
          if [ -n "$GENIUSPAY_API_KEY" ] && [ -n "$GENIUSPAY_API_SECRET" ]; then
            npx netlify env:set GENIUSPAY_API_KEY "$GENIUSPAY_API_KEY" --context production --site "$NETLIFY_SITE_ID" --auth "$NETLIFY_AUTH_TOKEN"
            npx netlify env:set GENIUSPAY_API_SECRET "$GENIUSPAY_API_SECRET" --context production --site "$NETLIFY_SITE_ID" --auth "$NETLIFY_AUTH_TOKEN"
          else
            echo "GeniusPay credentials incomplete; keeping existing Netlify production env unchanged."
          fi

      - name: Deploy production
        run: npx netlify deploy --prod --dir=dist --functions=netlify/functions --site "$NETLIFY_SITE_ID" --auth "$NETLIFY_AUTH_TOKEN"
